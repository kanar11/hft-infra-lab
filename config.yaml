# HFT Infrastructure Lab — Configuration
#
# All parameters can be overridden via environment variables prefixed with HFT_

# Risk Manager limits
risk:
  max_position_per_symbol: 5000    # Max shares per symbol
  max_portfolio_exposure: 50000    # Max total absolute exposure
  max_daily_loss: 100000.0         # Daily P&L loss limit ($)
  max_orders_per_second: 1000      # Rate limit
  max_order_value: 500000.0        # Max single order notional ($)
  max_drawdown_pct: 5.0            # Max drawdown from peak (%)
  max_price_band_pct: 20.0         # Fat-finger band vs ref price (%, <=0 off)

# OMS parameters
oms:
  max_position: 10000              # Max position per symbol
  max_order_value: 1000000.0       # Max single order value ($)

# Strategy parameters
strategy:
  window: 20                       # SMA lookback period (ticks)
  threshold_pct: 0.1               # Deviation threshold (%)
  order_size: 100                  # Default order quantity

# Smart Order Router
router:
  default_strategy: BEST_PRICE     # BEST_PRICE | LOWEST_LATENCY | SPLIT
  split_threshold: 500             # Min order size for SPLIT
  venues:
    - name: NYSE
      latency_ns: 500
      fee_per_share: 0.003
    - name: NASDAQ
      latency_ns: 200
      fee_per_share: -0.002        # Negative = maker rebate
    - name: BATS
      latency_ns: 150
      fee_per_share: -0.001

# Simulator settings
simulator:
  num_messages: 10000              # Default message count
  seed: 42                         # Random seed for reproducibility
  stocks:                          # Optional symbol universe (falls back to built-in default if omitted)
    - symbol: AAPL
      base_price: 175.00
    - symbol: MSFT
      base_price: 410.00
    - symbol: GOOGL
      base_price: 155.00
    - symbol: AMZN
      base_price: 185.00
    - symbol: TSLA
      base_price: 245.00
    - symbol: META
      base_price: 500.00
    - symbol: NVDA
      base_price: 880.00
    - symbol: JPM
      base_price: 195.00

# Logging configuration
logging:
  level: INFO                      # DEBUG | INFO | WARNING | ERROR
