name: HFT Infra Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run OMS tests
        run: python tests/test_oms.py

      - name: Run ITCH tests
        run: python tests/test_itch.py

      - name: Run OUCH tests
        run: python tests/test_ouch.py

      - name: Run FIX tests
        run: python tests/test_fix.py

      - name: Run Router tests
        run: python tests/test_router.py

      - name: Run Risk tests
        run: python tests/test_risk.py

      - name: Run Logger tests
        run: python tests/test_logger.py

      - name: Run benchmarks
        run: python tests/benchmark.py

  build-cpp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install g++
        run: sudo apt-get update && sudo apt-get install -y g++

      - name: Build all C++ modules
        run: make build

      - name: Run orderbook demo
        run: ./orderbook/orderbook

      - name: Run orderbook_v2 demo
        run: ./orderbook/orderbook_v2

      - name: Run C++ benchmarks
        run: |
          ./orderbook/benchmark_orderbook
          ./orderbook/latency_histogram 100000
          ./lockfree/spsc_queue
          ./memory-latency/cache_latency
          ./itch-parser/benchmark_itch
          ./benchmarks/latency_benchmark 50000
          ./benchmarks/orderbook_benchmark 50000
          ./oms/oms_demo 100000
          ./risk/risk_demo 100000
          ./router/router_demo 100000
          ./logger/logger_demo 100000
          ./strategy/strategy_demo 100000
          ./fix-protocol/fix_demo 100000
          ./ouch-protocol/ouch_demo 100000
          ./dpdk-bypass/dpdk_demo 50000
          ./monitoring/monitor_demo 50000
          ./multicast/multicast_demo 50000
