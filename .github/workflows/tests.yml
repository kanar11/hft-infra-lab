name: HFT Infra Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck

      - name: Static analysis (cppcheck)
        run: |
          cppcheck --enable=warning,performance \
                   --std=c++17 --error-exitcode=1 \
                   --suppress=missingIncludeSystem \
                   --suppress=ctuOneDefinitionRuleViolation \
                   --inline-suppr \
                   common/ config/ oms/ risk/ router/ logger/ strategy/ \
                   fix-protocol/ ouch-protocol/ lockfree/ \
                   multicast/ simulator/ tests/ \
                   orderbook/ itch-parser/ memory-latency/ \
                   benchmarks/ dpdk-bypass/ monitoring/

  build-and-test:
    runs-on: ubuntu-latest
    # clang++ is non-blocking until any remaining clang-only warnings are addressed.
    continue-on-error: ${{ matrix.compiler == 'clang++' }}
    strategy:
      fail-fast: false
      matrix:
        compiler: [g++, clang++]
    steps:
      - uses: actions/checkout@v4

      - name: Install ${{ matrix.compiler }}
        run: |
          sudo apt-get update
          if [ "${{ matrix.compiler }}" = "clang++" ]; then
            sudo apt-get install -y clang
          else
            sudo apt-get install -y g++
          fi

      - name: Build all C++ modules
        run: make build CXX=${{ matrix.compiler }}

      - name: Run orderbook tests
        run: |
          ./orderbook/orderbook
          ./orderbook/orderbook_v2

      - name: Run OMS tests
        run: ./oms/oms_demo 0

      - name: Run Risk Manager tests
        run: ./risk/risk_demo 0

      - name: Run Smart Router tests
        run: ./router/router_demo 0

      - name: Run Trade Logger tests
        run: ./logger/logger_demo 0

      - name: Run Strategy tests
        run: ./strategy/strategy_demo 0

      - name: Run FIX Protocol tests
        run: ./fix-protocol/fix_demo 0

      - name: Run OUCH Protocol tests
        run: ./ouch-protocol/ouch_demo 0

      - name: Run DPDK Bypass tests
        run: ./dpdk-bypass/dpdk_demo 0

      - name: Run Monitoring tests
        run: ./monitoring/monitor_demo 0

      - name: Run Multicast tests
        run: ./multicast/multicast_demo 0

      - name: Run Market Simulator tests
        run: ./simulator/sim_demo 0

      - name: Run Integration tests
        run: ./tests/test_all

      - name: Run benchmarks
        run: |
          ./orderbook/benchmark_orderbook
          ./orderbook/latency_histogram 100000
          ./lockfree/spsc_queue
          ./memory-latency/cache_latency
          ./itch-parser/benchmark_itch
          ./benchmarks/latency_benchmark 50000
          ./benchmarks/orderbook_benchmark 50000
          ./oms/oms_demo 100000
          ./risk/risk_demo 100000
          ./router/router_demo 100000
          ./logger/logger_demo 100000
          ./strategy/strategy_demo 100000
          ./fix-protocol/fix_demo 100000
          ./ouch-protocol/ouch_demo 100000
          ./dpdk-bypass/dpdk_demo 50000
          ./monitoring/monitor_demo 50000
          ./multicast/multicast_demo 50000
          ./simulator/sim_demo 50000

  sanitizers:
    # ASAN+UBSAN on the integration suite, TSAN on the SPSC stress benchmark.
    # Catches buffer overruns, divide-by-zero, signed overflow (ASAN/UBSAN) and
    # data races / memory ordering bugs (TSAN) that the normal CI run can't see.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install g++
        run: sudo apt-get update && sudo apt-get install -y g++
      - name: Build tests/test_all with ASAN + UBSAN
        run: |
          g++ -O1 -g -fsanitize=address,undefined -fno-omit-frame-pointer \
              -std=c++17 -Wall -Wextra -Werror -pthread \
              -o tests/test_all tests/test_all.cpp
      - name: Run instrumented integration tests
        run: ASAN_OPTIONS=detect_leaks=1 UBSAN_OPTIONS=print_stacktrace=1:halt_on_error=1 ./tests/test_all
      - name: Build SPSC stress with TSAN
        run: |
          g++ -O1 -g -fsanitize=thread -fno-omit-frame-pointer \
              -std=c++17 -Wall -Wextra -pthread \
              -o lockfree/spsc_queue lockfree/spsc_queue.cpp
      - name: Run TSAN-instrumented SPSC stress
        run: TSAN_OPTIONS=halt_on_error=1 ./lockfree/spsc_queue
