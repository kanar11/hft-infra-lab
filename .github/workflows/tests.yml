name: HFT Infra Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck

      - name: Static analysis (cppcheck)
        run: |
          # We exclude feed/wss_client.hpp and feed/wss_demo.cpp — they need
          # -DHFT_USE_OPENSSL + OpenSSL headers. The compile-check runs separately
          # w build-and-test job z apt-installed libssl-dev.
          cppcheck --enable=warning,performance \
                   --std=c++17 --error-exitcode=1 \
                   --suppress=missingIncludeSystem \
                   --suppress=ctuOneDefinitionRuleViolation \
                   --suppress=preprocessorErrorDirective:feed/wss_client.hpp \
                   --suppress=*:feed/wss_demo.cpp \
                   --inline-suppr \
                   common/ config/ oms/ risk/ router/ logger/ strategy/ \
                   fix-protocol/ ouch-protocol/ lockfree/ \
                   multicast/ simulator/ tests/ replay/ network/ feed/ \
                   orderbook/ itch-parser/ memory-latency/ \
                   benchmarks/ dpdk-bypass/ monitoring/

  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [g++, clang++]
    steps:
      - uses: actions/checkout@v4

      - name: Install ${{ matrix.compiler }}
        run: |
          sudo apt-get update
          if [ "${{ matrix.compiler }}" = "clang++" ]; then
            sudo apt-get install -y clang
          else
            sudo apt-get install -y g++
          fi

      - name: Build all C++ modules
        run: make build CXX=${{ matrix.compiler }}

      - name: Run orderbook tests
        run: |
          ./orderbook/orderbook
          ./orderbook/orderbook_v2
          ./orderbook/orderbook_flat 100000     # sanity + small bench
          ./orderbook/orderbook_pro_demo 50000  # FullOrderBook tests + benchmark

      - name: Run OMS tests
        run: ./oms/oms_demo 0

      - name: Run Risk Manager tests
        run: ./risk/risk_demo 0

      - name: Run Smart Router tests
        run: ./router/router_demo 0

      - name: Run Trade Logger tests
        run: ./logger/logger_demo 0

      - name: Run Strategy tests
        run: ./strategy/strategy_demo 0

      - name: Run Market Maker simulation (10k ticks)
        run: ./strategy/mm_demo 10000

      - name: Run Execution Algos demo (TWAP vs VWAP)
        run: ./strategy/exec_demo

      - name: Run FIX Protocol tests
        run: ./fix-protocol/fix_demo 0

      - name: Run OUCH Protocol tests
        run: ./ouch-protocol/ouch_demo 0

      - name: Run DPDK Bypass tests
        run: ./dpdk-bypass/dpdk_demo 0

      - name: Run Monitoring tests
        run: ./monitoring/monitor_demo 0

      - name: Run Multicast tests
        run: ./multicast/multicast_demo 0

      - name: Run Market Simulator tests
        run: ./simulator/sim_demo 0

      - name: Run LOBSTER replay (bundled 20-event sample)
        run: ./replay/lobster_demo replay/sample_aapl.csv

      - name: Run LOBSTER replay (5k generated fixture, full pipeline)
        run: ./replay/lobster_demo replay/generated_aapl_day.csv

      - name: Run epoll TCP FIX server (self-test, ~1s)
        run: timeout 10 ./network/fix_server_demo

      - name: Run WebSocket feed demo (self-contained mock server + client)
        run: timeout 10 ./feed/feed_demo

      - name: Build optional wss_demo (TLS) — compile-only check
        run: |
          sudo apt-get install -y libssl-dev
          make wss CXX=${{ matrix.compiler }}
          test -x feed/wss_demo
          echo "wss_demo built OK (not run — needs a connection to the exchange)"

      - name: Run lockfree correctness stress (all 6 primitives, no sanitizers)
        run: ./lockfree/lockfree_stress

      - name: Run Integration tests
        run: ./tests/test_all

      - name: Run benchmarks
        run: |
          ./orderbook/benchmark_orderbook
          ./orderbook/latency_histogram 100000
          ./orderbook/orderbook_flat 1000000   # FlatOrderBook vs std::map head-to-head
          ./lockfree/spsc_queue
          ./memory-latency/cache_latency
          ./itch-parser/benchmark_itch
          ./benchmarks/latency_benchmark 50000
          ./benchmarks/orderbook_benchmark 50000
          ./oms/oms_demo 100000
          ./risk/risk_demo 100000
          ./router/router_demo 100000
          ./logger/logger_demo 100000
          ./strategy/strategy_demo 100000
          ./fix-protocol/fix_demo 100000
          ./ouch-protocol/ouch_demo 100000
          ./dpdk-bypass/dpdk_demo 50000
          ./monitoring/monitor_demo 50000
          ./multicast/multicast_demo 50000
          ./simulator/sim_demo 50000

  sanitizers:
    # ASAN+UBSAN on the integration suite, TSAN on the SPSC stress benchmark.
    # Catches buffer overruns, divide-by-zero, signed overflow (ASAN/UBSAN) and
    # data races / memory ordering bugs (TSAN) that the normal CI run can't see.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install g++
        run: sudo apt-get update && sudo apt-get install -y g++
      - name: Build tests/test_all with ASAN + UBSAN
        run: |
          g++ -O1 -g -fsanitize=address,undefined -fno-omit-frame-pointer \
              -std=c++17 -Wall -Wextra -Werror -pthread \
              -o tests/test_all tests/test_all.cpp
      - name: Run instrumented integration tests
        run: ASAN_OPTIONS=detect_leaks=1 UBSAN_OPTIONS=print_stacktrace=1:halt_on_error=1 ./tests/test_all
      - name: Build SPSC stress with TSAN
        run: |
          g++ -O1 -g -fsanitize=thread -fno-omit-frame-pointer \
              -std=c++17 -Wall -Wextra -pthread \
              -o lockfree/spsc_queue lockfree/spsc_queue.cpp
      - name: Run TSAN-instrumented SPSC stress
        run: TSAN_OPTIONS=halt_on_error=1 ./lockfree/spsc_queue
      - name: Build full lockfree stress suite with TSAN (MPSC/MPMC/Waitable/Sequencer/VarlenRing)
        run: |
          g++ -O1 -g -fsanitize=thread -fno-omit-frame-pointer \
              -std=c++17 -Wall -Wextra -pthread \
              -o lockfree/lockfree_stress lockfree/lockfree_stress.cpp
      - name: Run TSAN-instrumented lockfree stress suite
        run: TSAN_OPTIONS=halt_on_error=1 ./lockfree/lockfree_stress

  python-bindings:
    # Build the pyhft pybind11 extension and run its demo end-to-end.
    # The extension lives in bindings/ and exposes OMS, RiskManager,
    # FlatOrderBook (plus the relevant enums/structs).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ python3-dev python3-pip python3-setuptools
      - name: Install pybind11
        run: pip3 install --user pybind11
      - name: Build pyhft extension
        run: python3 bindings/setup.py build_ext --inplace
      - name: Run pyhft demo
        run: python3 bindings/demo.py
      - name: Run pyhft unit tests (error paths, edge cases)
        run: python3 bindings/test_pyhft.py

  clang-tidy:
    # Complementary to cppcheck — catches bugprone-* and performance-* patterns
    # cppcheck doesn't model (move semantics, range-based for, redundant copies).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install clang-tidy
        run: sudo apt-get update && sudo apt-get install -y clang-tidy
      - name: Run clang-tidy (bugprone + performance)
        run: |
          clang-tidy --version
          clang-tidy \
            -checks='-*,bugprone-*,performance-*,modernize-use-nullptr,modernize-use-override,-bugprone-easily-swappable-parameters' \
            --warnings-as-errors='*' \
            oms/oms_demo.cpp \
            risk/risk_demo.cpp \
            logger/logger_demo.cpp \
            strategy/strategy_demo.cpp \
            tests/test_all.cpp \
            -- -std=c++17 -Wall -Wextra -pthread -I.
